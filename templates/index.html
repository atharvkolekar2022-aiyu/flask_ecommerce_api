<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Commerce Store</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            padding: 30px;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            border-bottom: 3px solid #667eea;
            padding-bottom: 20px;
        }

        h1 {
            color: #667eea;
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #666;
            font-size: 1.1em;
        }

        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .control-section {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            border-left: 4px solid #667eea;
        }

        .control-section h2 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 1.3em;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: #333;
            font-weight: 500;
        }

        input, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 1em;
            font-family: inherit;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 5px rgba(102, 126, 234, 0.5);
        }

        button {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        button:hover {
            background: #764ba2;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .search-bar {
            display: flex;
            gap: 10px;
        }

        .search-bar input {
            flex: 1;
        }

        .search-bar button {
            width: auto;
            min-width: 100px;
        }

        .products-section {
            margin-top: 40px;
        }

        .products-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #667eea;
        }

        .products-header h2 {
            color: #667eea;
            font-size: 1.5em;
        }

        .product-count {
            background: #667eea;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: 600;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .product-card {
            background: #f8f9fa;
            border-radius: 8px;
            overflow: hidden;
            transition: all 0.3s ease;
            border: 2px solid transparent;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .product-card:hover {
            border-color: #667eea;
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.3);
        }

        .product-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px;
        }

        .product-id {
            font-size: 0.9em;
            opacity: 0.9;
        }

        .product-name {
            font-size: 1.3em;
            font-weight: 700;
            margin: 8px 0;
        }

        .product-body {
            padding: 15px;
        }

        .product-price {
            font-size: 1.8em;
            color: #667eea;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .product-description {
            color: #666;
            font-size: 0.95em;
            margin-bottom: 10px;
            line-height: 1.4;
        }

        .product-quantity {
            color: #999;
            font-size: 0.9em;
            margin-bottom: 15px;
        }

        .quantity-badge {
            display: inline-block;
            background: #e8f0ff;
            color: #667eea;
            padding: 4px 10px;
            border-radius: 4px;
            font-weight: 600;
        }

        .product-actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .btn-edit, .btn-delete {
            padding: 10px;
            font-size: 0.9em;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-edit {
            background: #28a745;
            color: white;
        }

        .btn-edit:hover {
            background: #218838;
            transform: translateY(-2px);
        }

        .btn-delete {
            background: #dc3545;
            color: white;
        }

        .btn-delete:hover {
            background: #c82333;
            transform: translateY(-2px);
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        .empty-state-icon {
            font-size: 4em;
            margin-bottom: 20px;
        }

        .loading {
            text-align: center;
            color: #667eea;
            font-size: 1.1em;
            padding: 20px;
        }

        .alert {
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 5px;
            display: none;
        }

        .alert.show {
            display: block;
        }

        .alert.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .alert.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 10px;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }

        .modal-header {
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #667eea;
        }

        .modal-header h2 {
            color: #667eea;
        }

        .modal-actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 20px;
        }

        .btn-cancel {
            background: #6c757d;
        }

        .btn-cancel:hover {
            background: #5a6268;
        }

        @media (max-width: 768px) {
            .controls {
                grid-template-columns: 1fr;
            }

            h1 {
                font-size: 1.8em;
            }

            .products-grid {
                grid-template-columns: 1fr;
            }

            .modal-content {
                max-width: 95%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header>
            <h1>🛍️ E-Commerce Store</h1>
            <p class="subtitle">Manage your products with ease</p>
        </header>

        <!-- Alert -->
        <div id="alert" class="alert"></div>

        <!-- Controls -->
        <div class="controls">
            <!-- Add Product Form -->
            <div class="control-section">
                <h2>Add New Product</h2>
                <form id="addProductForm">
                    <div class="form-group">
                        <label for="productName">Product Name</label>
                        <input type="text" id="productName" required placeholder="e.g., Laptop">
                    </div>
                    <div class="form-group">
                        <label for="productPrice">Price</label>
                        <input type="number" id="productPrice" required placeholder="e.g., 999.99" step="0.01" min="0">
                    </div>
                    <div class="form-group">
                        <label for="productDescription">Description (Optional)</label>
                        <textarea id="productDescription" placeholder="Product description..."></textarea>
                    </div>
                    <div class="form-group">
                        <label for="productQuantity">Quantity (Optional)</label>
                        <input type="number" id="productQuantity" placeholder="0" value="0" min="0">
                    </div>
                    <button type="submit">Add Product</button>
                </form>
            </div>

            <!-- Search Bar -->
            <div class="control-section">
                <h2>Search Products</h2>
                <div class="form-group">
                    <label for="searchInput">Search by Name</label>
                    <div class="search-bar">
                        <input type="text" id="searchInput" placeholder="Search...">
                        <button type="button" id="searchBtn">Search</button>
                    </div>
                </div>
                <button type="button" id="loadAllBtn" style="margin-top: 10px;">Load All</button>
            </div>
        </div>

        <!-- Products Section -->
        <div class="products-section">
            <div class="products-header">
                <h2>Products</h2>
                <div class="product-count" id="productCount">0 items</div>
            </div>
            <div id="productsContainer" class="products-grid">
                <div class="empty-state">
                    <div class="empty-state-icon">📦</div>
                    <p>No products available. Add some products to get started!</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Edit Modal -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Edit Product</h2>
            </div>
            <form id="editProductForm">
                <div class="form-group">
                    <label for="editProductId">Product ID</label>
                    <input type="number" id="editProductId" readonly style="background: #f0f0f0; cursor: not-allowed;">
                </div>
                <div class="form-group">
                    <label for="editProductName">Product Name</label>
                    <input type="text" id="editProductName" required>
                </div>
                <div class="form-group">
                    <label for="editProductPrice">Price</label>
                    <input type="number" id="editProductPrice" required step="0.01" min="0">
                </div>
                <div class="form-group">
                    <label for="editProductDescription">Description</label>
                    <textarea id="editProductDescription"></textarea>
                </div>
                <div class="form-group">
                    <label for="editProductQuantity">Quantity</label>
                    <input type="number" id="editProductQuantity" min="0">
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn-cancel" onclick="closeEditModal()">Cancel</button>
                    <button type="submit">Update Product</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:5000/api';

        // Show alert message
        function showAlert(message, type = 'success') {
            const alertEl = document.getElementById('alert');
            alertEl.textContent = message;
            alertEl.className = `alert show ${type}`;
            setTimeout(() => {
                alertEl.classList.remove('show');
            }, 4000);
        }

        // Load all products
        async function loadProducts() {
            try {
                const response = await fetch(`${API_URL}/products`);
                if (!response.ok) throw new Error('Failed to load products');
                
                const products = await response.json();
                displayProducts(products);
                document.getElementById('productCount').textContent = `${products.length} item${products.length !== 1 ? 's' : ''}`;
            } catch (error) {
                showAlert('Error loading products: ' + error.message, 'error');
            }
        }

        // Display products in grid
        function displayProducts(products) {
            const container = document.getElementById('productsContainer');
            
            if (products.length === 0) {
                container.innerHTML = `
                    <div class="empty-state" style="grid-column: 1/-1;">
                        <div class="empty-state-icon">📦</div>
                        <p>No products found</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = products.map(product => `
                <div class="product-card">
                    <div class="product-header">
                        <div class="product-id">ID: ${product.id}</div>
                        <div class="product-name">${product.name}</div>
                    </div>
                    <div class="product-body">
                        <div class="product-price">$${product.price.toFixed(2)}</div>
                        ${product.description ? `<div class="product-description">${product.description}</div>` : ''}
                        <div class="product-quantity">
                            Stock: <span class="quantity-badge">${product.quantity} units</span>
                        </div>
                        <div class="product-actions">
                            <button class="btn-edit" onclick="openEditModal(${product.id})">Edit</button>
                            <button class="btn-delete" onclick="deleteProduct(${product.id})">Delete</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // Add product
        document.getElementById('addProductForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const newProduct = {
                name: document.getElementById('productName').value,
                price: parseFloat(document.getElementById('productPrice').value),
                description: document.getElementById('productDescription').value || undefined,
                quantity: parseInt(document.getElementById('productQuantity').value) || 0
            };

            try {
                const response = await fetch(`${API_URL}/products`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(newProduct)
                });

                if (!response.ok) throw new Error('Failed to add product');
                
                showAlert('Product added successfully!', 'success');
                e.target.reset();
                loadProducts();
            } catch (error) {
                showAlert('Error adding product: ' + error.message, 'error');
            }
        });

        // Search products
        document.getElementById('searchBtn').addEventListener('click', async () => {
            const query = document.getElementById('searchInput').value.trim();
            if (!query) {
                showAlert('Please enter a search term', 'error');
                return;
            }

            try {
                const response = await fetch(`${API_URL.replace('/api', '')}/search?q=${encodeURIComponent(query)}`);
                if (!response.ok) throw new Error('Search failed');
                
                const result = await response.json();
                displayProducts(result.results);
                document.getElementById('productCount').textContent = `${result.results.length} result${result.results.length !== 1 ? 's' : ''}`;
                showAlert(`Found ${result.results.length} product(s)`, 'success');
            } catch (error) {
                showAlert('Error searching products: ' + error.message, 'error');
            }
        });

        // Load all products button
        document.getElementById('loadAllBtn').addEventListener('click', () => {
            document.getElementById('searchInput').value = '';
            loadProducts();
        });

        // Open edit modal
        async function openEditModal(productId) {
            try {
                const response = await fetch(`${API_URL}/products/${productId}`);
                if (!response.ok) throw new Error('Failed to load product');
                
                const product = await response.json();
                document.getElementById('editProductId').value = product.id;
                document.getElementById('editProductName').value = product.name;
                document.getElementById('editProductPrice').value = product.price;
                document.getElementById('editProductDescription').value = product.description || '';
                document.getElementById('editProductQuantity').value = product.quantity || 0;
                document.getElementById('editModal').classList.add('active');
            } catch (error) {
                showAlert('Error loading product: ' + error.message, 'error');
            }
        }

        // Close edit modal
        function closeEditModal() {
            document.getElementById('editModal').classList.remove('active');
        }

        // Update product
        document.getElementById('editProductForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const productId = document.getElementById('editProductId').value;
            const updatedProduct = {
                name: document.getElementById('editProductName').value,
                price: parseFloat(document.getElementById('editProductPrice').value),
                description: document.getElementById('editProductDescription').value || undefined,
                quantity: parseInt(document.getElementById('editProductQuantity').value) || 0
            };

            try {
                const response = await fetch(`${API_URL}/products/${productId}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(updatedProduct)
                });

                if (!response.ok) throw new Error('Failed to update product');
                
                showAlert('Product updated successfully!', 'success');
                closeEditModal();
                loadProducts();
            } catch (error) {
                showAlert('Error updating product: ' + error.message, 'error');
            }
        });

        // Delete product
        async function deleteProduct(productId) {
            if (!confirm('Are you sure you want to delete this product?')) return;

            try {
                const response = await fetch(`${API_URL}/products/${productId}`, {
                    method: 'DELETE'
                });

                if (!response.ok) throw new Error('Failed to delete product');
                
                showAlert('Product deleted successfully!', 'success');
                loadProducts();
            } catch (error) {
                showAlert('Error deleting product: ' + error.message, 'error');
            }
        }

        // Close modal when clicking outside
        document.getElementById('editModal').addEventListener('click', (e) => {
            if (e.target.id === 'editModal') closeEditModal();
        });

        // Load products on page load
        loadProducts();
    </script>
</body>
</html>
